<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="../node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../public/CSS/styles.css">
  <title>Travel Blog</title>
  <style>
    .form-control {
      border-color: rgba(63, 61, 61, 0.468);
    }

    .card-body p {
      margin-bottom: 0.25rem;
    }

    .card-body a {
      display: block;
    }

    .card-body img {
      flex-shrink: 0;
    }

    .card {
      overflow: hidden;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">Travel Website</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/gallery">Gallery</a></li>
          <li class="nav-item"><a class="nav-link" href="/distance">Distance Calculator</a></li>
          <li class="nav-item"><a class="nav-link" href="/blog">Blog</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h1>Travel Blog</h1>

    <div id="find-data" class="row mb-4">
      <form id="search-form" class="row g-2 align-items-end">
        <div class="col-md-8">
          <label for="city" class="form-label">Find blog by city</label>
          <input type="text" id="city" class="form-control" required />
        </div>
        <div class="col-md-4">
          <button type="submit" id="find-data-click" class="btn btn-primary w-100">Find Blog</button>
        </div>
      </form>
    </div>

    <div class="row">
      <div id="blog-posts" class="col-md-8">
        </div>

      <section class="col-md-4 mb-5" id="add-blogs">
        <h3 class="mb-3">Add New Blog Post</h3>
        <form id="blog-form" method="post" action="/blog">
          <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" name="title" class="form-control" id="title" required />
          </div>
          <div class="mb-3">
            <label for="content" class="form-label">Content</label>
            <textarea class="form-control" name="content" id="content" rows="5" required></textarea>
          </div>
          <div class="mb-3">
            <input type="text" class="form-control" name="disable" id="disable" disabled />
            <input type="hidden" name="disable_mail" id="disable_mail" />
          </div>
          <div id="logdiv"></div>
          <button type="submit" class="btn btn-primary mt-2">Add Blog</button>
        </form>
      </section>
    </div>
  </div>

  <button type="button" class="btn btn-primary btn-lg position-fixed rounded-circle" style="right:25px; bottom: 25px;" id="modeldisplay">
    <svg viewBox="0 0 449 572" width="20" height="27" fill="currentColor">
      <path d="M256 80c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 144L48 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l144 0 0 144c0 17.7 14.3 32 32 32s32-14.3 32-32l0-144 144 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-144 0 0-144z" />
    </svg>
  </button>

  <div class="modal fade" id="modelId" tabindex="-1" aria-labelledby="modelTitleId" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modelTitleId">Login Required</h5>
        </div>
        <div class="modal-body">
          If you want to write a new blog, logging in is required.
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Continue Reading</button>
          <a class="btn btn-primary" href="/">Go to Login</a>
        </div>
      </div>
    </div>
  </div>

  <a href="#add-blogs" id="gotobutton" style="display: none;"></a>
  <button data-bs-toggle="modal" data-bs-target="#modelId" id="modelshow" style="display: none;"></button>

  <script src="../node_modules/@popperjs/core/dist/umd/popper.min.js"></script>
  <script src="../node_modules/bootstrap/dist/js/bootstrap.min.js"></script>

  <script>
    // Local storage login handling
    const mail1 = localStorage.getItem("mail");
    const aa = '<a href="/login" class="d-block mb-3">Login</a>';

    if (!mail1) {
      document.getElementById('logdiv').innerHTML = aa;
      localStorage.clear();
    }
    
    const fallbackText = "Please Relogin for User confirmation";
    document.getElementById('disable_mail').value = mail1 || fallbackText;
    document.getElementById('disable').value = mail1 || fallbackText;

    // Load Blog Posts
    document.addEventListener("DOMContentLoaded", () => {
      if (window.location.pathname === "/blog") {
        fetch("/api/blog")
          .then((response) => response.json())
          .then((posts) => {
            renderPosts(posts);
          })
          .catch((error) => {
            const blogPosts = document.getElementById("blog-posts");
            blogPosts.innerHTML = `<div class="alert alert-danger">Error fetching blog posts: ${error.message}</div>`;
          });
      }
    });

    // Helper function to render data
    function renderPosts(posts) {
      const blogPosts = document.getElementById("blog-posts");
      blogPosts.innerHTML = "";
      
      posts.forEach((post) => {
        const emailDisplay = post?.mail ? '@' + post.mail.split(/[0-9@]/)[0] : 'Anonymous';
        const postDate = post.post_date || post.created_at;

        const blogPost = `
          <div class="card border-primary mt-3 px-3 shadow-sm">
            <div class="card-body d-flex align-items-start p-2">
              <div class="flex-grow-1">
                <p class="mb-1 text-primary" style="font-size: 0.9rem;"><i>${post?.title || 'No Title'}</i></p>
                <a class="form-text" style="font-size: 0.8rem;" href="#">${emailDisplay}</a>
              </div>
            </div>
            <hr class="my-1" />
            <div class="px-2 mb-2" style="max-height: 60px; overflow-y: auto;">
              <p class="m-0" style="font-size: 0.85rem;">${post?.content || ''}</p>
            </div>
            <div class="d-flex justify-content-end px-2 py-1">
              <small class="text-muted">${new Date(postDate).toLocaleString()}</small>
            </div>
          </div>`;
        blogPosts.innerHTML += blogPost;
      });
    }

    // Searching Handler
    document.getElementById('search-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const city = document.getElementById('city').value;
      const blogPosts = document.getElementById("blog-posts");

      try {
        const response1 = await fetch("find-blogs", {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ city }),
        });

        const data = await response1.json();

        if (response1.ok && Array.isArray(data)) {
          renderPosts(data);
        } else {
          blogPosts.innerHTML = `<div class="mt-3 alert alert-danger">Error: ${data.message || 'Failed to fetch blogs.'}</div>`;
        }
      } catch (error) {
        blogPosts.innerHTML = `<div class="mt-3 alert alert-danger">Error fetching blog posts: ${error.message}</div>`;
      }
    });

    // Modal check action trigger
    document.getElementById('modeldisplay').addEventListener('click', async (event) => {
      event.preventDefault();

      try {
        const response2 = await fetch("showmodel", { method: 'GET' });
        const data = await response2.json();

        if (data.excute === 'goto()') {
          document.getElementById('gotobutton').click();
        } else {
          document.getElementById('modelshow').click();
        }
      } catch (err) {
        document.getElementById('modelshow').click();
      }
    });
  </script>
</body>

</html>
